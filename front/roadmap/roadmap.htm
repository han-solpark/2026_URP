<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 학습 로드맵</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* 학년 입력 모달 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
        }

        .modal-content h2 {
            color: #667eea;
            margin-bottom: 30px;
            text-align: center;
        }

        .grade-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .grade-button {
            padding: 20px;
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #333;
        }

        .grade-button:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
            transform: translateY(-5px);
        }

        .hidden {
            display: none;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .summary-card {
            max-width: 800px;
            margin: 0 auto 60px;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .summary-card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        .current-grade-indicator {
            text-align: center;
            padding: 15px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .summary-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .summary-item strong {
            display: block;
            color: #667eea;
            margin-bottom: 5px;
            font-size: 0.9rem;
        }

        .timeline-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            padding: 20px 0;
        }

        /* 중앙 세로선 */
        .timeline-container::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 4px;
            background: rgba(255, 255, 255, 0.3);
            transform: translateX(-50%);
        }

        .timeline-phase {
            position: relative;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 타임라인 점 */
        .timeline-dot {
            position: absolute;
            left: 50%;
            top: 0;
            width: 30px;
            height: 30px;
            background: white;
            border: 4px solid #667eea;
            border-radius: 50%;
            transform: translateX(-50%);
            z-index: 2;
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.2);
        }

        .timeline-dot.past {
            background: #4CAF50;
            border-color: #4CAF50;
        }

        .timeline-dot.current {
            background: #FF9800;
            border-color: #FF9800;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 8px rgba(255, 152, 0, 0.2); }
            50% { box-shadow: 0 0 0 15px rgba(255, 152, 0, 0.1); }
        }

        /* Phase 헤더 */
        .phase-header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .phase-header h3 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .phase-duration {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
        }

        .phase-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            margin-top: 10px;
            font-weight: bold;
        }

        .phase-status.past {
            background: #4CAF50;
            color: white;
        }

        .phase-status.current {
            background: #FF9800;
            color: white;
        }

        .phase-status.future {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        /* 활동 카드들 */
        .activities-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 800px;
            margin: 0 auto;
        }

        .activity-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            padding-top: 35px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
            position: relative;
            overflow: hidden;
        }

        .activity-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .activity-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        /* 완료된 활동 카드 */
        .activity-card.completed {
            background: #f8f9fa;
            border: 2px solid #4CAF50;
        }

        .activity-card.completed::before {
            background: #4CAF50;
        }

        .completed-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #4CAF50;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .activity-note {
            margin-top: 15px;
            padding: 10px;
            background: #e8f5e9;
            border-radius: 5px;
            font-size: 0.85rem;
            color: #2e7d32;
        }

        /* 추천 활동 배지 */
        .recommended-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #FF9800;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .activity-icon {
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .activity-card h4 {
            color: #333;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .activity-card p {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .activity-arrow {
            position: absolute;
            bottom: 15px;
            right: 15px;
            color: #667eea;
            font-size: 1.5rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .activity-card:hover .activity-arrow {
            opacity: 1;
        }

        .activity-card.completed .activity-arrow {
            display: none;
        }

        /* 홈 버튼 */
        .home-button {
            text-align: center;
            margin-top: 60px;
        }

        .home-button a {
            display: inline-block;
            padding: 15px 40px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .home-button a:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        /* 활동 추가 버튼 */
        .add-activity-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            z-index: 100;
        }

        .add-activity-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        /* 활동 상세/추가 모달 */
        .detail-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .detail-modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }

        .detail-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .detail-modal-header h2 {
            color: #667eea;
            font-size: 1.8rem;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2rem;
            color: #999;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: #333;
        }

        .detail-content {
            margin: 20px 0;
        }

        .detail-item {
            margin-bottom: 20px;
        }

        .detail-item label {
            display: block;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .detail-item p {
            color: #555;
            line-height: 1.8;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .detail-item input,
        .detail-item select,
        .detail-item textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Malgun Gothic', sans-serif;
            transition: border-color 0.3s ease;
        }

        .detail-item input:focus,
        .detail-item select:focus,
        .detail-item textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .detail-item textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        .modal-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .modal-btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .modal-btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .modal-btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .modal-btn-secondary:hover {
            background: #e0e0e0;
        }

        .activity-card.completed {
            cursor: pointer;
        }

        .activity-card.completed:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(76, 175, 80, 0.3);
        }

        /* 반응형 */
        @media (max-width: 768px) {
            .activities-grid {
                grid-template-columns: 1fr;
            }

            .timeline-container::before {
                left: 20px;
            }

            .timeline-dot {
                left: 20px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .phase-header h3 {
                font-size: 1.4rem;
            }

            .add-activity-btn {
                bottom: 20px;
                right: 20px;
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
            }

            .detail-modal-content {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <!-- 학년 입력 모달 -->
    <div id="gradeModal" class="modal-overlay">
        <div class="modal-content">
            <h2>현재 학년을 선택해주세요</h2>
            <div class="grade-buttons">
                <button class="grade-button" onclick="selectGrade(1)">1학년</button>
                <button class="grade-button" onclick="selectGrade(2)">2학년</button>
                <button class="grade-button" onclick="selectGrade(3)">3학년</button>
                <button class="grade-button" onclick="selectGrade(4)">4학년</button>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <div class="header">
            <h1>🎯 맞춤형 학습 로드맵</h1>
            <p>학년별 추천 활동 및 프로그램</p>
        </div>

        <div class="summary-card">
            <h2>📊 분석 요약</h2>
            <div class="current-grade-indicator">
                현재 학년: <span id="currentGradeText">-</span>
            </div>
            <div class="summary-grid">
                <div class="summary-item">
                    <strong>학습 유형</strong>
                    A 유형 (체계적 분석가)
                </div>
                <div class="summary-item">
                    <strong>학년</strong>
                    <span id="gradeDisplay">-</span>
                </div>
                <div class="summary-item">
                    <strong>관심 분야</strong>
                    인공지능/머신러닝
                </div>
                <div class="summary-item">
                    <strong>주간 학습 시간</strong>
                    10-15시간
                </div>
            </div>
        </div>

        <div class="timeline-container" id="timelineContainer">
            <!-- 동적으로 생성됨 -->
        </div>

        <div class="home-button">
            <a href="index.htm">🏠 홈으로 돌아가기</a>
        </div>
    </div>

    <!-- 활동 추가 버튼 -->
    <button class="add-activity-btn hidden" id="addActivityBtn" onclick="openAddModal()">+</button>

    <!-- 활동 상세보기 모달 -->
    <div id="detailModal" class="detail-modal hidden">
        <div class="detail-modal-content">
            <div class="detail-modal-header">
                <h2 id="detailTitle">활동 상세</h2>
                <button class="close-btn" onclick="closeDetailModal()">×</button>
            </div>
            <div class="detail-content">
                <div class="detail-item">
                    <label>활동명</label>
                    <p id="detailActivityName"></p>
                </div>
                <div class="detail-item">
                    <label>완료 시기</label>
                    <p id="detailDate"></p>
                </div>
                <div class="detail-item">
                    <label>활동 내용</label>
                    <p id="detailNote"></p>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeDetailModal()">닫기</button>
            </div>
        </div>
    </div>

    <!-- 활동 추가 모달 -->
    <div id="addModal" class="detail-modal hidden">
        <div class="detail-modal-content">
            <div class="detail-modal-header">
                <h2>새 활동 추가</h2>
                <button class="close-btn" onclick="closeAddModal()">×</button>
            </div>
            <div class="detail-content">
                <div class="detail-item">
                    <label>학년 선택</label>
                    <select id="addGrade">
                        <option value="1">1학년</option>
                        <option value="2">2학년</option>
                        <option value="3">3학년</option>
                        <option value="4">4학년</option>
                    </select>
                </div>
                <div class="detail-item">
                    <label>활동명</label>
                    <input type="text" id="addActivityName" placeholder="예: URP 연구 프로젝트">
                </div>
                <div class="detail-item">
                    <label>완료 시기</label>
                    <input type="text" id="addDate" placeholder="예: 2024년 1학기">
                </div>
                <div class="detail-item">
                    <label>활동 내용</label>
                    <textarea id="addNote" placeholder="활동 내용을 자유롭게 작성해주세요"></textarea>
                </div>
            </div>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-secondary" onclick="closeAddModal()">취소</button>
                <button class="modal-btn modal-btn-primary" onclick="saveActivity()">저장</button>
            </div>
        </div>
    </div>

    <script>
        let currentGrade = 0;

        // 학년별 활동 데이터 (더미 데이터 - 과거 완료 활동)
        const completedActivities = {

            ],
            2: [
                {

                },
                {

                    note: '교내 AI 해커톤에서 팀원들과 함께 챗봇 프로젝트를 진행했습니다. 24시간 동안 기획부터 개발까지 완성하여 우수상을 수상했습니다.'
                },
                { 
                    icon: '🔬', 
                    title: 'URP 2형', 
                    date: '2024년 2학기',
                    note: 'CNN을 활용한 이미지 분류 연구 프로젝트를 수행했습니다. PyTorch를 사용하여 모델을 구현하고 데이터 증강 기법을 적용하여 정확도를 향상시켰습니다.'
                },
                { 
                    icon: '📊', 
                    title: 'Kaggle 대회', 
                    date: '2024년 하반기',
                    note: 'Titanic 생존 예측 대회에 참가하여 상위 10%의 성적을 거두었습니다. Feature Engineering과 앙상블 기법의 중요성을 체감했습니다.'
                }
            ]
        };

        // 학년별 추천 활동 데이터
        const recommendedActivities = {
            1: [
                { icon: '🔬', title: 'URP 1형', desc: '학부생 연구 프로그램 참여를 통한 연구 기초 역량 강화', link: 'https://www.skku.edu/skku/campus/skk_comm/notice01.do?mode=view&articleNo=134615&article.offset=0&articleLimit=10&srSearchVal=urp' },
                { icon: '💻', title: '프로그래밍 동아리', desc: '코딩 스터디 및 팀 프로젝트 경험', link: '#' },
                { icon: '📐', title: '기초 수학 특강', desc: 'AI/ML에 필요한 수학 기초 다지기', link: '#' },
                { icon: '👥', title: 'SW 멘토링', desc: '선배와 함께하는 1:1 코딩 멘토링', link: '#' }
            ],
            2: [
                { icon: '🤖', title: 'ML 스터디', desc: '머신러닝 알고리즘 심화 학습', link: '#' },
                { icon: '🏆', title: '해커톤 참가', desc: '팀 프로젝트 및 실전 경험 쌓기', link: '#' },
                { icon: '🔬', title: 'URP 2형', desc: '심화 연구 프로젝트 수행', link: 'https://www.skku.edu/skku/campus/skk_comm/notice01.do?mode=view&articleNo=134615&article.offset=0&articleLimit=10&srSearchVal=urp' },
                { icon: '📊', title: 'Kaggle 대회', desc: '실전 데이터 분석 경진대회', link: '#' }
            ],
            3: [
                { icon: '📚', title: '논문 세미나', desc: '최신 AI 논문 리딩 및 토론', link: '#' },
                { icon: '💼', title: '인턴십', desc: '산업체 연구 인턴 경험', link: '#' },
                { icon: '🔬', title: '연구실 인턴', desc: '교내 연구실 프로젝트 참여', link: '#' },
                { icon: '✈️', title: '국제 학회 참석', desc: '해외 컨퍼런스 참가 및 네트워킹', link: '#' }
            ],
            4: [
                { icon: '📝', title: '졸업 논문', desc: '학부 연구 프로젝트 완성', link: '#' },
                { icon: '💼', title: '포트폴리오 구축', desc: 'GitHub 및 개인 프로젝트 정리', link: '#' },
                { icon: '🎯', title: '취업 준비', desc: '기업 코딩테스트 및 면접 대비', link: '#' },
                { icon: '🎓', title: '대학원 진학', desc: '석사/박사 과정 준비 및 지원', link: '#' }
            ]
        };

        const gradeNames = ['', '1학년', '2학년', '3학년', '4학년'];
        const gradeSubtitles = ['', '🌱 기초 탐색 시기', '📚 핵심 역량 구축', '🚀 전문성 심화', '🎓 진로 준비 및 완성'];

        function selectGrade(grade) {
            currentGrade = grade;
            document.getElementById('gradeModal').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('addActivityBtn').classList.remove('hidden');
            document.getElementById('currentGradeText').textContent = gradeNames[grade];
            document.getElementById('gradeDisplay').textContent = gradeNames[grade];
            document.getElementById('addGrade').value = grade;
            
            renderTimeline();
        }

        function renderTimeline() {
            const container = document.getElementById('timelineContainer');
            container.innerHTML = '';

            for (let grade = 1; grade <= 4; grade++) {
                const phaseDiv = document.createElement('div');
                phaseDiv.className = 'timeline-phase';
                
                let phaseStatus = '';
                let dotClass = '';
                if (grade < currentGrade) {
                    phaseStatus = 'past';
                    dotClass = 'past';
                } else if (grade === currentGrade) {
                    phaseStatus = 'current';
                    dotClass = 'current';
                } else {
                    phaseStatus = 'future';
                    dotClass = '';
                }

                let statusText = '';
                if (phaseStatus === 'past') statusText = '완료';
                else if (phaseStatus === 'current') statusText = '진행 중';
                else statusText = '예정';

                phaseDiv.innerHTML = `
                    <div class="timeline-dot ${dotClass}"></div>
                    <div class="phase-header">
                        <h3>${gradeNames[grade]}</h3>
                        <p class="phase-duration">${gradeSubtitles[grade]}</p>
                        <span class="phase-status ${phaseStatus}">${statusText}</span>
                    </div>
                    <div class="activities-grid" id="activities-${grade}">
                    </div>
                `;

                container.appendChild(phaseDiv);

                const activitiesGrid = document.getElementById(`activities-${grade}`);

                // 과거 학년 - 완료된 활동 표시
                if (grade < currentGrade && completedActivities[grade]) {
                    completedActivities[grade].forEach((activity, index) => {
                        const card = document.createElement('div');
                        card.className = 'activity-card completed';
                        card.onclick = () => openDetailModal(activity);
                        card.innerHTML = `
                            <span class="completed-badge">✓ 완료</span>
                            <div class="activity-icon">${activity.icon}</div>
                            <h4>${activity.title}</h4>
                            <div class="activity-note">${activity.date}</div>
                        `;
                        activitiesGrid.appendChild(card);
                    });
                }
                // 현재 및 미래 학년 - 추천 활동 표시
                else if (recommendedActivities[grade]) {
                    recommendedActivities[grade].forEach(activity => {
                        const card = document.createElement('a');
                        card.className = 'activity-card';
                        card.href = activity.link;
                        if (activity.link !== '#') {
                            card.target = '_blank';
                        } else {
                            card.onclick = (e) => {
                                e.preventDefault();
                                alert('상세 정보 준비중입니다.');
                            };
                        }

                        if (grade === currentGrade) {
                            card.innerHTML = `
                                <span class="recommended-badge">추천</span>
                                <div class="activity-icon">${activity.icon}</div>
                                <h4>${activity.title}</h4>
                                <p>${activity.desc}</p>
                                <span class="activity-arrow">→</span>
                            `;
                        } else {
                            card.innerHTML = `
                                <div class="activity-icon">${activity.icon}</div>
                                <h4>${activity.title}</h4>
                                <p>${activity.desc}</p>
                                <span class="activity-arrow">→</span>
                            `;
                        }
                        
                        activitiesGrid.appendChild(card);
                    });
                }
            }
        }

        // 상세보기 모달 열기
        function openDetailModal(activity) {
            document.getElementById('detailActivityName').textContent = activity.title;
            document.getElementById('detailDate').textContent = activity.date;
            document.getElementById('detailNote').textContent = activity.note;
            document.getElementById('detailModal').classList.remove('hidden');
        }

        // 상세보기 모달 닫기
        function closeDetailModal() {
            document.getElementById('detailModal').classList.add('hidden');
        }

        // 추가 모달 열기
        function openAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
        }

        // 추가 모달 닫기
        function closeAddModal() {
            document.getElementById('addModal').classList.add('hidden');
            // 입력 필드 초기화
            document.getElementById('addActivityName').value = '';
            document.getElementById('addDate').value = '';
            document.getElementById('addNote').value = '';
        }

        // 활동 저장
        function saveActivity() {
            const grade = parseInt(document.getElementById('addGrade').value);
            const name = document.getElementById('addActivityName').value.trim();
            const date = document.getElementById('addDate').value.trim();
            const note = document.getElementById('addNote').value.trim();

            if (!name || !date || !note) {
                alert('모든 항목을 입력해주세요.');
                return;
            }

            // 새 활동 추가
            const newActivity = {
                icon: '📌',
                title: name,
                date: date,
                note: note
            };

            if (!completedActivities[grade]) {
                completedActivities[grade] = [];
            }
            completedActivities[grade].push(newActivity);

            // 모달 닫기
            closeAddModal();

            // 타임라인 다시 렌더링
            renderTimeline();

            alert('활동이 추가되었습니다!');
        }

        // 모달 외부 클릭시 닫기
        window.onclick = function(event) {
            const detailModal = document.getElementById('detailModal');
            const addModal = document.getElementById('addModal');
            if (event.target === detailModal) {
                closeDetailModal();
            }
            if (event.target === addModal) {
                closeAddModal();
            }
        }
    </script>
</body>
