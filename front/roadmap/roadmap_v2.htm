<!DOCTYPE html>

<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>맞춤형 학습 로드맵</title>

    <style>

        /* 기존 스타일 및 색상 유지 */

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {

            font-family: 'Malgun Gothic', sans-serif;

            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

            min-height: 100vh;

            padding: 40px 20px;

        }

        .header { text-align: center; color: white; margin-bottom: 60px; }

        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }



        .timeline-container { max-width: 900px; margin: 0 auto; position: relative; padding: 20px 0; }

       

        /* [수정] 가운데 흰 선 제거를 위해 주석 처리 */

        /*

        .timeline-container::before {

            content: ''; position: absolute; left: 50%; top: 0; bottom: 0;

            width: 4px; background: rgba(255, 255, 255, 0.3); transform: translateX(-50%);

        }

        */



        .timeline-phase { position: relative; margin-bottom: 50px; }



        /* [수정] 흰 동그라미 스타일 제거를 위해 주석 처리 */

        /*

        .timeline-dot {

            position: absolute; left: 50%; top: 20px; width: 30px; height: 30px;

            background: white; border: 4px solid #667eea; border-radius: 50%;

            transform: translateX(-50%); z-index: 2;

        }

        */



        /* 학년 버튼 스타일 */

        .grade-header {

            text-align: center; padding: 20px; cursor: pointer;

            background: rgba(255, 255, 255, 0.1); border-radius: 15px;

            transition: all 0.3s; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.2);

        }

        .grade-header:hover { background: rgba(255, 255, 255, 0.2); }

        .grade-header h3 { color: white; font-size: 1.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }



        /* 학기 영역 (기본 숨김) */

        .semester-container { display: none; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 15px; margin-bottom: 30px; }

        .semester-container.active { display: block; animation: fadeIn 0.5s; }



        /* 학기 선택 버튼 그룹 */

        .semester-buttons { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; }

        .sem-btn {

            padding: 10px 25px; border: none; border-radius: 50px; background: white;

            color: #667eea; font-weight: bold; cursor: pointer; transition: all 0.3s;

            box-shadow: 0 4px 10px rgba(0,0,0,0.2);

        }

        .sem-btn:hover { transform: translateY(-3px); background: #f0f0f0; }



        /* 학기별 미리보기 섹션 */

        .preview-section { margin-bottom: 40px; }

        .preview-title { color: white; font-size: 1.2rem; margin-bottom: 15px; padding-left: 10px; border-left: 4px solid white; }

       

        .activities-grid {

            display: grid; grid-template-columns: repeat(2, 1fr);

            gap: 20px; margin-bottom: 20px;

        }



        .activity-card {

            background: white; border-radius: 12px; padding: 20px;

            box-shadow: 0 5px 15px rgba(0,0,0,0.1); text-decoration: none; color: inherit;

            position: relative; overflow: hidden;

        }

        .activity-card::before {

            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;

            background: linear-gradient(90deg, #667eea, #764ba2);

        }

        .activity-card h4 { color: #333; font-size: 1.1rem; margin-bottom: 8px; }

        .activity-card p { color: #666; font-size: 0.85rem; line-height: 1.5; }



        /* 모달 스타일 */

        .modal {

            display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%;

            background: rgba(0,0,0,0.8); align-items: center; justify-content: center;

        }

        .modal-content {

            background: #f4f7fb; border-radius: 20px; width: 90%; max-width: 600px;

            max-height: 80vh; overflow-y: auto; padding: 30px; position: relative;

        }

        .modal-close { position: absolute; right: 20px; top: 15px; font-size: 2rem; cursor: pointer; }



        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) { .activities-grid { grid-template-columns: 1fr; } }



        .home-button { text-align: center; margin-top: 40px; }

        .home-button a {

            display: inline-block; padding: 12px 35px; background: white; color: #667eea;

            text-decoration: none; border-radius: 50px; font-weight: bold;

        }

    </style>

</head>

<body>

    <div class="header">

        <h1>🎯 맞춤형 학습 로드맵</h1>

        <p>학년을 클릭하여 학기별 로드맵을 확인하세요</p>

    </div>



    <div class="timeline-container" id="roadmapContainer">

        </div>



    <div class="modal" id="semModal">

        <div class="modal-content">

            <span class="modal-close" onclick="closeModal()">&times;</span>

            <h2 id="modalTitle" style="color:#667eea; margin-bottom:20px; text-align:center;">학기 상세 활동</h2>

            <div id="modalList"></div>

        </div>

    </div>



    <div class="home-button">

        <a href="../index_v2.htm">🏠 홈으로 돌아가기</a>

    </div>



    <script>

        // 기본 데이터 (예시)

        const defaultActs = [

            { grade: "1학년", semester: "1학년 1학기", name: "프로그래밍 기초", content: "C언어 및 알고리즘 기초 학습", date: "2025-03" },

            { grade: "1학년", semester: "1학년 1학기", name: "동아리 활동", content: "웹 개발 스터디 참여", date: "2025-04" },

            { grade: "1학년", semester: "1학년 2학기", name: "URP 기초", content: "연구실 학부생 프로그램 참여", date: "2025-09" }

        ];



        const userActs = JSON.parse(localStorage.getItem('userActivities')) || [];

        const allActs = [...defaultActs, ...userActs].filter(a => !a.hidden);



        // YYYY-MM 또는 YYYY-MM-DD 형식의 날짜를 Date 객체로 변환

        function toDate(dateStr) {

            if (!dateStr) return new Date(0);

            // "YYYY-MM" 형식이면 "YYYY-MM-01"로 변환

            if (dateStr.length === 7) dateStr += '-01';

            return new Date(dateStr);

        }



        function renderRoadmap() {

            const container = document.getElementById('roadmapContainer');

            const grades = ["1학년", "2학년", "3학년", "4학년"];



            grades.forEach(grade => {

                const phase = document.createElement('div');

                phase.className = 'timeline-phase';

               

                const gradeActs = allActs.filter(a => a.semester.startsWith(grade));

                const sem1 = gradeActs.filter(a => a.semester.includes("1학기")).sort((a,b) => toDate(a.date||a.start) - toDate(b.date||b.start));

                const sem2 = gradeActs.filter(a => a.semester.includes("2학기")).sort((a,b) => toDate(a.date||a.start) - toDate(b.date||b.start));



                // [수정] JS에서 동그라미 div 생성 코드 삭제함

                phase.innerHTML = `

                    <div class="grade-header" onclick="toggleGrade('${grade}')">

                        <h3>${grade}</h3>

                    </div>

                    <div class="semester-container" id="content-${grade}">

                        <div class="semester-buttons">

                            <button class="sem-btn" onclick="openSemModal('${grade} 1학기')">${grade} 1학기 상세보기</button>

                            <button class="sem-btn" onclick="openSemModal('${grade} 2학기')">${grade} 2학기 상세보기</button>

                        </div>

                       

                        <div class="preview-section">

                            <h4 class="preview-title">1학기</h4>

                            <div class="activities-grid">${renderPreview(sem1)}</div>

                        </div>



                        <div class="preview-section">

                            <h4 class="preview-title">2학기</h4>

                            <div class="activities-grid">${renderPreview(sem2)}</div>

                        </div>

                    </div>

                `;

                container.appendChild(phase);

            });

        }



        // 조건 1: 학기당 미리보기 4개 제한 함수

        function renderPreview(acts) {

            if (acts.length === 0) return '<p style="color:rgba(255,255,255,0.6); padding:10px;">등록된 활동이 없습니다.</p>';

            return acts.slice(0, 4).map(act => `

                <div class="activity-card">

                    <h4>${act.name}</h4>

                    <p>${act.content.substring(0, 40)}${act.content.length > 40 ? '...' : ''}</p>

                </div>

            `).join('');

        }



        // 학년 클릭 시 토글

        function toggleGrade(grade) {

            const content = document.getElementById(`content-${grade}`);

            const isActive = content.classList.contains('active');

           

            document.querySelectorAll('.semester-container').forEach(c => c.classList.remove('active'));

           

            if (!isActive) content.classList.add('active');

        }



        // 조건 2: 학기 버튼 클릭 시 상세 모달

        function openSemModal(semName) {

            const modal = document.getElementById('semModal');

            const list = document.getElementById('modalList');

            document.getElementById('modalTitle').textContent = `${semName} 전체 활동`;

           

            const semActs = allActs.filter(a => a.semester === semName)

                                   .sort((a,b) => toDate(a.date||a.start) - toDate(b.date||b.start));



            if (semActs.length === 0) {

                list.innerHTML = '<p style="text-align:center; padding:20px;">활동 데이터가 없습니다.</p>';

            } else {

                list.innerHTML = semActs.map(act => `

                    <div class="activity-card" style="margin-bottom:15px; border:1px solid #ddd;">

                        <span style="font-size:0.75rem; color:#667eea; font-weight:bold;">${act.date || act.start || ''}</span>

                        <h4 style="margin-top:5px;">${act.name}</h4>

                        <p style="margin-top:5px;">${act.content}</p>

                        ${act.url ? `<a href="${act.url}" target="_blank" style="font-size:0.8rem; color:#667eea;">관련 링크 보기</a>` : ''}

                    </div>

                `).join('');

            }

            modal.style.display = 'flex';

        }



        function closeModal() { document.getElementById('semModal').style.display = 'none'; }



        window.onload = renderRoadmap;

    </script>

</body>

</html>
