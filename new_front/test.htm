<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>커리어넷 심리검사</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; max-width: 800px; margin: 0 auto; }
        .question-card { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .options { margin-top: 10px; }
        label { margin-right: 15px; cursor: pointer; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        #submit-btn { background-color: #4CAF50; color: white; border: none; margin-top: 20px; }
        #result-link { margin-top: 30px; display: none; padding: 20px; background: #f0f7ff; border-radius: 10px; text-align: center; }
        a { color: #007bff; font-weight: bold; text-decoration: none; font-size: 1.2em; }
    </style>
</head>
<body>

    <h1>대학생/성인 직업흥미검사</h1>
    <div id="question-container">문항을 불러오는 중입니다...</div>
    
    <button id="submit-btn" style="display:none;">결과 전송하기</button>
    
    <div id="result-link">
        <p>검사가 완료되었습니다! 🎉</p>
        <a id="report-url" href="#" target="_blank">👉 나의 결과 리포트 확인하기</a>
    </div>

    <script>
        // 🔴 수정된 부분: URL이 아니라 '키 값'만 딱 넣어야 해!
        const API_KEY = '7e5af4e6c5fbe064f07ba221a72feb8d'; 
        const Q_TYPE = '10'; // 대학생/성인용 직업흥미검사
        const answers = {}; 

        async function loadQuestions() {
            try {
                // 주소 형식을 정확하게 맞췄어
                const response = await fetch(`https://www.career.go.kr/cnet/openapi/getOpenApi/test/questions?apikey=${API_KEY}&q=${Q_TYPE}`);
                const data = await response.json();
                
                // 데이터 구조 확인 (가끔 RESULT가 없을 때를 대비)
                const questions = data.RESULT;

                const container = document.getElementById('question-container');
                container.innerHTML = ''; 

                questions.forEach((q, index) => {
                    const div = document.createElement('div');
                    div.className = 'question-card';
                    div.innerHTML = `
                        <p><strong>${index + 1}. ${q.question}</strong></p>
                        <div class="options">
                            <label><input type="radio" name="q${q.qitemNo}" onclick="saveAnswer('${q.qitemNo}', '1')"> 전혀 아니다</label>
                            <label><input type="radio" name="q${q.qitemNo}" onclick="saveAnswer('${q.qitemNo}', '2')"> 아니다</label>
                            <label><input type="radio" name="q${q.qitemNo}" onclick="saveAnswer('${q.qitemNo}', '3')"> 그렇다</label>
                            <label><input type="radio" name="q${q.qitemNo}" onclick="saveAnswer('${q.qitemNo}', '4')"> 매우 그렇다</label>
                        </div>
                    `;
                    container.appendChild(div);
                });

                document.getElementById('submit-btn').style.display = 'block';
            } catch (error) {
                console.error("오류 상세:", error);
                alert("문항을 불러오지 못했습니다. API 키가 활성화되었는지, 주소가 맞는지 확인해봐!");
            }
        }

        function saveAnswer(qNo, value) {
            answers[qNo] = value;
        }

        document.getElementById('submit-btn').onclick = async function() {
            const formattedAnswers = Object.entries(answers)
                .map(([no, val]) => `${no}=${val}`)
                .join(' ');

            // 모든 문항에 답했는지 체크하는 로직 (검사마다 문항수가 다르니 주의!)
            if (Object.keys(answers).length === 0) {
                alert("답변을 하나라도 선택해줘!");
                return;
            }

            try {
                // 결과 생성 API 호출 (이 부분은 검사 완료 후 리포트 URL을 받아오는 과정이야)
                const res = await fetch(`https://www.career.go.kr/cnet/openapi/getOpenApi/test/report?apikey=${API_KEY}&q=${Q_TYPE}&answers=${formattedAnswers}`, {
                    method: 'POST'
                });
                const resultData = await res.json();
                
                if (resultData.RESULT && resultData.RESULT.url) {
                    document.getElementById('report-url').href = resultData.RESULT.url;
                    document.getElementById('result-link').style.display = 'block';
                    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
                } else {
                    alert("결과 생성에 실패했어. 답변 형식을 확인해봐.");
                }
            } catch (error) {
                alert("서버 전송 중 오류가 발생했어.");
            }
        };

        loadQuestions();
    </script>
</body>
</html>
